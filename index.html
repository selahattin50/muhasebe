<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./logo.png" />
    <title>Ön Muhasebe</title>
    <!-- 2.0.1 APK'nin özgün web arayüzü: görsel ve ekran yapısı birebirdir. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // 2.0.1 koyu arayüzünü korurken, alıcı caride Tahsilat/Gelir alanının
      // muhasebe yönünü düzelt: tahsilat Alacak olarak kaydedilir.
      (async () => {
        const source = await fetch('/assets/index-Cm4a6Zcb.js').then((response) => response.text());
        const corrected = source
          .replace(
            'type:cB?"Borc":"Alacak",document_type:cB?"tahsilat":"odeme"',
            'type:cB?"Alacak":"Borc",document_type:cB?"tahsilat":"odeme"',
          )
          // Cari seçildiğinde bakiyeyi giriş alanlarına otomatik yazan etkiyi kaldır.
          .replace(
            /const DB=dc\(UA\.balance\),EB=String\(UA\.type\|\|""\)\.toLowerCase\(\);let zB=null;[\s\S]*?\},\[eQ,R,QQ\]\);/,
            'zg(null),Pg(""),AC("")},[eQ,R,QQ]);',
          );
        await import(URL.createObjectURL(new Blob([corrected], { type: 'text/javascript' })));
      })();
    </script>
    <script>
      // 2.0.1 raporu nakit tahsilatını alacağa ekliyordu. Görünümü
      // değiştirmeden, ekrandaki rapor özetini cari bakiyesi mantığıyla düzelt.
      (() => {
        const amountOf = (value) => {
          const text = String(value || '').replace(/[^0-9,.-]/g, '');
          const normalized = text.includes(',')
            ? text.replace(/\./g, '').replace(',', '.')
            : text;
          return Number.parseFloat(normalized) || 0;
        };

        const format = (value) => value.toLocaleString('tr-TR', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });

        const fixText = (value) => String(value || '')
          .toLocaleLowerCase('tr-TR')
          .replace(/ı/g, 'i')
          .replace(/ş/g, 's')
          .replace(/ğ/g, 'g')
          .replace(/ü/g, 'u')
          .replace(/ö/g, 'o')
          .replace(/ç/g, 'c')
          .trim();

        // APK'nin React durumundan cari/fatura/hareket dizilerini bulur.
        // Bu sayede eski `balance` alanına değil, gerçek hareketlere dayanır.
        const readLedgerData = () => {
          const root = document.getElementById('root');
          const key = root && Object.keys(root).find((name) => name.startsWith('__reactContainer$'));
          const rootFiber = key && root[key];
          if (!rootFiber) return null;

          const arrays = [];
          const seen = new Set();
          const visit = (fiber) => {
            if (!fiber || seen.has(fiber)) return;
            seen.add(fiber);
            for (let hook = fiber.memoizedState; hook; hook = hook.next) {
              if (Array.isArray(hook.memoizedState)) arrays.push(hook.memoizedState);
            }
            visit(fiber.child);
            visit(fiber.sibling);
          };
          visit(rootFiber);

          const caris = arrays.find((items) => items.some((item) => item && item.code && item.name && item.type));
          const invoices = arrays.find((items) => items.some((item) => item && item.cari_id != null && item.total_amount != null));
          const transactions = arrays.find((items) => items.some((item) => item && item.cari_id != null && item.amount != null && item.total_amount == null));
          return caris && invoices && transactions ? { caris, invoices, transactions } : null;
        };

        const correctPickerBalances = () => {
          const data = readLedgerData();
          const picker = document.querySelector('.movement-cari-picker-list');
          if (!data) return;

          const balances = new Map(data.caris.map((cari) => [String(cari.id), 0]));
          data.invoices.forEach((invoice) => {
            const cari = data.caris.find((item) => String(item.id) === String(invoice.cari_id));
            if (!cari) return;
            const amount = Number(invoice.total_amount) || 0;
            const role = fixText(cari.type);
            const type = fixText(invoice.type);
            const increasesBalance = role.includes('satici') ? type.includes('alis') : type.includes('satis');
            balances.set(String(cari.id), (balances.get(String(cari.id)) || 0) + (increasesBalance ? amount : -amount));
          });
          data.transactions.forEach((transaction) => {
            const id = String(transaction.cari_id);
            if (!balances.has(id)) return;
            const amount = Number(transaction.amount) || 0;
            const type = fixText(transaction.type);
            // Tahsilat (Alacak) ve ödeme (Borç) mevcut cari bakiyesini azaltır.
            const reducesBalance = type.includes('alacak') || type.includes('borc');
            balances.set(id, (balances.get(id) || 0) + (reducesBalance ? -amount : amount));
          });
          window.__cariLedgerBalances = { caris: data.caris, balances };
          // Hesap ilk açılışta da hazırlanır; seçim penceresi daha sonra açılabilir.
          if (!picker) return;

          picker.querySelectorAll('.movement-cari-picker-item').forEach((row) => {
            const text = fixText(row.textContent);
            const cari = data.caris.find((item) => text.includes(fixText(item.code)) && text.includes(fixText(item.name)));
            if (!cari) return;
            const balance = balances.get(String(cari.id)) || 0;
            const value = Array.from(row.querySelectorAll('span')).find((span) => span.textContent.includes('₺'));
            if (!value) return;
            const next = `₺${format(Math.abs(balance))}`;
            if (value.textContent !== next) value.textContent = next;
            value.classList.toggle('text-emerald-600', balance >= 0);
            value.classList.toggle('text-red-600', balance < 0);
          });
        };

        const correctStoredBalanceDisplays = () => {
          const ledger = window.__cariLedgerBalances;
          if (!ledger) return;
          const findCari = (text) => {
            const normalized = fixText(text);
            return ledger.caris.find((item) => normalized.includes(fixText(item.code)) && normalized.includes(fixText(item.name)));
          };
          const apply = (container, cari) => {
            if (!cari) return;
            const balance = ledger.balances.get(String(cari.id)) || 0;
            const value = Array.from(container.querySelectorAll('span')).find((span) => span.textContent.includes('₺'));
            if (!value) return;
            const label = balance > 0 ? 'Alacak' : balance < 0 ? 'Borç' : 'Denk';
            const next = `₺${format(Math.abs(balance))} ${label}`;
            if (value.textContent !== next) value.textContent = next;
            value.classList.toggle('text-emerald-600', balance > 0);
            value.classList.toggle('text-red-600', balance < 0);
            value.classList.toggle('text-slate-500', balance === 0);
          };

          document.querySelectorAll('.cari-list-card').forEach((card) => apply(card, findCari(card.textContent)));
          const movementSummary = document.querySelector('.movement-entry-cari-summary');
          if (movementSummary) apply(movementSummary, findCari(movementSummary.textContent));
        };

        const correctReportTotals = () => {
          const report = document.querySelector('.movement-report-page');
          if (!report) return;

          let borc = 0;
          let alacak = 0;
          report.querySelectorAll('.movement-report-row').forEach((row) => {
            const type = row.querySelector('.movement-report-badge')?.textContent
              ?.trim().toLocaleLowerCase('tr-TR') || '';
            const amountElement = row.querySelector('.movement-report-amount');
            const amount = amountOf(amountElement?.textContent);
            if (!amount) return;

            // Satış müşteriden alacağımızı, alış tedarikçiye borcumuzu artırır.
            // Nakit satırının rengi uygulamanın gerçek yönünü verir: yeşil giriş
            // (müşteriden tahsilat), kırmızı çıkış (satıcıya ödeme) demektir.
            if (type.includes('satış') || type.includes('satis')) alacak += amount;
            else if (type.includes('alış') || type.includes('alis')) borc += amount;
            else if (type.includes('nakit') || type.includes('tahsilat') || type.includes('havale') || type.includes('ödeme') || type.includes('odeme')) {
              if (amountElement?.classList.contains('movement-report-amount-out')) alacak += amount;
              else borc += amount;
            }
          });

          const bakiye = alacak - borc;
          const setValue = (element, value) => {
            if (element.textContent !== value) element.textContent = value;
          };
          report.querySelectorAll('.movement-report-totals > div').forEach((block) => {
            const label = block.querySelector('span')?.textContent?.trim().toLocaleLowerCase('tr-TR');
            const value = block.querySelector('strong');
            if (!value) return;
            if (label === 'borç' || label === 'borc') setValue(value, format(borc));
            if (label === 'alacak') setValue(value, format(alacak));
            if (label === 'bakiye') setValue(value, format(Math.abs(bakiye)));
          });
          correctPickerBalances();
        };

        const refreshBalances = () => {
          correctReportTotals();
          correctPickerBalances();
          correctStoredBalanceDisplays();
        };
        const observer = new MutationObserver(refreshBalances);
        observer.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
        document.addEventListener('DOMContentLoaded', refreshBalances);
      })();
    </script>
    <link rel="stylesheet" crossorigin href="/assets/index-11XwK_Qb.css" />
  </body>
</html>
